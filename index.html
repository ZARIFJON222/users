<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foydalanuvchilarni Boshqarish</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Foydalanuvchilarni Boshqarish Tizimi</h1>
        <p>JSON-Server + Fetch API yordamida</p>
      </header>

      <div class="content">
        <aside class="add-panel">
          <div class="panel-header">
            <span class="icon">+</span>
            <h2>Yangi Qo‘shish</h2>
          </div>

          <form id="user-form">
            <div class="form-group">
              <label>Ism Familya</label>
              <input
                type="text"
                name="name"
                placeholder="Masalan: Ali Valiyev"
                required
              />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                name="email"
                placeholder="ali@example.com"
                required
              />
            </div>
            <div class="form-group">
              <label>Telefon</label>
              <input
                type="tel"
                name="phone"
                placeholder="+998 90 123 45 67"
                required
              />
            </div>
            <div class="form-group">
              <label>Veb-sayt</label>
              <input
                type="text"
                name="website"
                placeholder="www.ali.uz"
                required
              />
            </div>

            <button type="submit" id="save-btn" class="btn btn-primary">
              Ma'lumotlarni Saqlash
            </button>
          </form>
        </aside>
        <section class="users-section">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="search-input"
              placeholder="Ism yoki email orqali qidiring..."
            />
          </div>

          <div id="user-list" class="user-grid"></div>

          <div id="empty-state" class="empty-state hidden">
            <p>Hech qanday foydalanuvchi topilmadi 😕</p>
          </div>
        </section>
      </div>
    </main>
    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Cardni Tahrirlash</h3>
          <button id="edit-close-btn" class="close-btn">✕</button>
        </div>
        <form id="edit-form">
          <div class="form-group">
            <label>Ism Familya</label>
            <input type="text" name="name" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required />
          </div>
          <div class="form-group">
            <label>Telefon</label>
            <input type="tel" name="phone" required />
          </div>
          <div class="form-group">
            <label>Veb-sayt</label>
            <input type="text" name="website" required />
          </div>
          <button type="submit" id="edit-save-btn" class="btn btn-primary">
            Yangilash
          </button>
        </form>
      </div>
    </div>
    <div id="status-message" class="status"></div>
    <script src="./script.js"></script>
  </body>
</html>
